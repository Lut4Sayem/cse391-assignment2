<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fortune Generator</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #1e1e2f;
        color: #f1f1f1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        margin: 0;
      }

      main {
        flex: 1;
      }

      h1 {
        text-align: center;
        padding-top: 40px;
      }

      footer {
        text-align: center;
        padding: 15px;
        background-color: #2a2a40;
        color: #aaa;
      }

      .fortune-section {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        padding: 40px;
      }

      #fortune-box {
        border: 2px solid #888;
        background-color: #2a2a40;
        color: #f1f1f1;
        padding: 20px 30px;
        max-width: 500px;
        text-align: center;
        font-size: 18px;
        border-radius: 6px;
      }

      .btn-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .color-btn {
        width: 50px;
        height: 50px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      .back-home {
        text-align: center;
        display: block;
        margin: 20px 0;
        text-decoration: none;
        color: #ccc;
      }

      .back-home:hover {
        color: white;
      }
    </style>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <h1 style="text-align: center; padding-top: 40px">
        ✨ Fortune Generator
      </h1>

      <div class="fortune-section">
        <!-- Fortune box -->
        <div id="fortune-box">Loading fortune...</div>

        <!-- Four buttons -->
        <div class="btn-grid">
          <button
            class="color-btn"
            id="btn1"
            style="background-color: #1b4332"
          ></button>
          <button
            class="color-btn"
            id="btn2"
            style="background-color: #fcd5ce"
          ></button>
          <button
            class="color-btn"
            id="btn3"
            style="background-color: #03045e"
          ></button>
          <button
            class="color-btn"
            id="btn4"
            style="background-color: #f5ebe0"
          ></button>
        </div>
      </div>
    </main>
    <a href="../index.html" class="back-home"> ← Back to Home </a>

    <footer>
      <p>© 2025 Fortune Generator</p>
    </footer>

    <script src="fortune.js"></script>
  </body>
</html>
