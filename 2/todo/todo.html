<!doctype html>
<html>
  <head>
    <title>To-Do List</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #1e1e2f;
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        color: #f1f1f1;
      }

      main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: #2a2a40;
        padding: 40px;
        border-radius: 10px;
        width: 400px;
        text-align: center;
      }

      h1 {
        margin-bottom: 25px;
      }

      .input-group {
        display: flex;
        gap: 10px;
      }

      #task-input {
        flex: 1;
        padding: 10px;
        font-size: 16px;
        border-radius: 6px;
        border: none;
        background-color: #ffffff;
        color: #000000;
      }

      #task-input::placeholder {
        color: #777;
      }

      #add-btn {
        padding: 10px 16px;
        background: #3a3a55;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      #add-btn:hover {
        background: #4a4a70;
      }

      #task-list {
        list-style: none;
        padding: 0;
        margin-top: 25px;
        text-align: left;
      }

      #task-list li {
        background: #3a3a55;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .completed {
        text-decoration: line-through;
        opacity: 0.6;
      }

      .delete-btn {
        background: #aa3a3a;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 4px;
        cursor: pointer;
      }

      footer {
        text-align: center;
        padding: 15px;
        background-color: #2a2a40;
        color: #aaa;
      }

      .back-home {
        text-align: center;
        display: block;
        margin: 20px 0;
        text-decoration: none;
        color: #ccc;
      }

      .back-home:hover {
        color: white;
      }
    </style>
  </head>

  <body>
    <main>
      <div class="container">
        <h1>📝 To-Do List</h1>

        <div class="input-group">
          <input type="text" id="task-input" placeholder="Enter a task..." />
          <button id="add-btn">Add</button>
        </div>

        <ul id="task-list"></ul>
      </div>
    </main>
    <a href="../index.html" class="back-home"> ← Back to Home </a>

    <footer>© 2025 To-Do List</footer>

    <script src="todo.js"></script>
  </body>
</html>
