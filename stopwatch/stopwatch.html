<!doctype html>
<html>
  <head>
    <title>Stopwatch</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #1e1e2f;
        color: #f1f1f1;
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        text-align: center;
      }

      main {
        flex: 1;
        padding-top: 100px;
      }

      #display {
        font-size: 48px;
        margin-bottom: 40px;
      }

      button {
        padding: 10px 20px;
        margin: 10px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 6px;
      }

      #start {
        background-color: #3a3a55;
        color: white;
      }

      #stop {
        background-color: #555577;
        color: white;
      }

      #reset {
        background-color: #aa3a3a;
        color: white;
      }

      footer {
        text-align: center;
        padding: 15px;
        background-color: #2a2a40;
        color: #aaa;
      }

      .back-home {
        text-align: center;
        display: block;
        margin: 20px 0;
        text-decoration: none;
        color: #ccc;
      }

      .back-home:hover {
        color: white;
      }
    </style>
  </head>

  <body>
    <main>
      <h1>⏱ Stopwatch</h1>

      <div id="display">0</div>

      <button id="start">Start</button>
      <button id="stop">Stop</button>
      <button id="reset">Reset</button>
    </main>
    <a href="../index.html" class="back-home"> ← Back to Home </a>

    <footer>© 2025 Stopwatch Application</footer>

    <script src="stopwatch.js"></script>
  </body>
</html>
